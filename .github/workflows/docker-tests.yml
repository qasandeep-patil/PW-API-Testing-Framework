name: Playwright Tests - Docker Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: Build Docker → Run Tests → Publish Report

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: pw-api-testing:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create directories for reports
        run: |
          mkdir -p ${{ github.workspace }}/test-results
          mkdir -p ${{ github.workspace }}/playwright-report

      - name: Run Playwright tests in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/test-results:/app/test-results \
            -v ${{ github.workspace }}/playwright-report:/app/playwright-report \
            pw-api-testing:${{ github.sha }}
        continue-on-error: true

      - name: Check if test results exist
        run: |
          if [ -f "${{ github.workspace }}/test-results/junit.xml" ]; then
            echo "✅ Test results found!"
            ls -la ${{ github.workspace }}/test-results/
          else
            echo "⚠️ No test results file found, listing directory:"
            ls -la ${{ github.workspace }}/test-results/ || echo "Directory empty"
          fi

      - name: Upload Playwright HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ${{ github.workspace }}/playwright-report
          retention-days: 30

      - name: Upload Test Results (JUnit)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: ${{ github.workspace }}/test-results
          retention-days: 30

      - name: Publish Test Report
        if: always() && hashFiles('test-results/junit.xml') != ''
        uses: dorny/test-reporter@v1
        with:
          name: Playwright Tests
          path: 'test-results/junit.xml'
          reporter: 'java-junit'
          fail-on-error: false

      - name: Comment PR with Test Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const testResultsPath = '${{ github.workspace }}/test-results/junit.xml';
            
            let comment = '## 📊 Test Results\n\n';
            
            if (fs.existsSync(testResultsPath)) {
              comment += '✅ Tests completed successfully!\n\n';
              comment += '📋 **Artifacts:**\n';
              comment += '- [Playwright HTML Report](../../actions/runs/${{ github.run_id }})\n';
              comment += '- [JUnit Results](../../actions/runs/${{ github.run_id }})\n';
            } else {
              comment += '⚠️ No test results found. Check workflow logs.\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: Test Results Summary
        if: always()
        run: |
          echo "## Test Execution Summary"
          echo "Artifacts Location: Actions → Run #${{ github.run_number }} → Artifacts"
          if [ -f "${{ github.workspace }}/test-results/junit.xml" ]; then
            echo "✅ JUnit Report: test-results/junit.xml"
          fi
          if [ -d "${{ github.workspace }}/playwright-report" ] && [ -f "${{ github.workspace }}/playwright-report/index.html" ]; then
            echo "✅ HTML Report: playwright-report/index.html"
          fi
